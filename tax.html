<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tax Calculator 2026</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          Segoe UI,
          sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 20px;
      }

      /* Glass Card */

      .main {
        width: 400px;
        padding: 35px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(15px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        text-align: center;
        color: white;
      }

      /* Title */

      h1 {
        margin-bottom: 20px;
      }

      /* Input */

      input {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        margin-bottom: 15px;
        font-size: 16px;
      }

      /* Button */

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(to right, #00c9ff, #92fe9d);
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
      }

      /* Result Card */

      .result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.2);
        animation: fade 0.6s ease;
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Table */

      table {
        width: 100%;
        margin-top: 15px;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        padding: 8px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Responsive */

      @media (max-width: 480px) {
        .main {
          width: 100%;
          padding: 25px;
        }

        h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>

  <body>
    <div class="main">
      <h1>Tax Calculator 2026</h1>

      <input type="number" id="inp-tax" placeholder="Enter Annual Income" />

      <button id="btn-cal">Calculate Tax</button>

      <div id="tax"></div>
    </div>

    <script>
      let inpTax = document.getElementById("inp-tax");
      let btnCal = document.getElementById("btn-cal");
      let tax = document.getElementById("tax");

      btnCal.addEventListener("click", () => {
        let income = Math.round(inpTax.value / 10) * 10;
        let taxAmount = 0;

        if (income >= 1200000) {
          if (income <= 400000) {
            taxAmount = 0;
          } else if (income <= 800000) {
            taxAmount = (income - 400000) * 0.05;
          } else if (income <= 1200000) {
            taxAmount = 400000 * 0.05 + (income - 800000) * 0.1;
          } else if (income <= 1600000) {
            taxAmount =
              400000 * 0.05 + 400000 * 0.1 + (income - 1200000) * 0.15;
          } else if (income <= 2000000) {
            taxAmount =
              400000 * 0.05 +
              400000 * 0.1 +
              400000 * 0.15 +
              (income - 1600000) * 0.2;
          } else if (income <= 2400000) {
            taxAmount =
              400000 * 0.05 +
              400000 * 0.1 +
              400000 * 0.15 +
              400000 * 0.2 +
              (income - 2000000) * 0.25;
          } else {
            taxAmount =
              400000 * 0.05 +
              400000 * 0.1 +
              400000 * 0.15 +
              400000 * 0.2 +
              400000 * 0.25 +
              (income - 2400000) * 0.3;
          }

          tax.innerHTML = `

<div class="result">

<h1>Total Income : ₹${income}</h3>
<h2>Total Tax : ₹${Math.round(taxAmount)}</h2>
<h3>Remaining Amount:₹${Math.round(income-taxAmount)}

<table>

<tr>
<th>Income Slab</th>
<th>Rate</th>
</tr>
<tr>
<td>0L - 4L</td>
<td>0%</td>
</tr>

<tr>
<td>4L - 8L</td>
<td>5%</td>
</tr>

<tr>
<td>8L - 12L</td>
<td>10%</td>
</tr>

<tr>
<td>12L - 16L</td>
<td>15%</td>
</tr>

<tr>
<td>16L - 20L</td>
<td>20%</td>
</tr>

<tr>
<td>20L - 24L</td>
<td>25%</td>
</tr>

<tr>
<td>Above 24L</td>
<td>30%</td>
</tr>

</table>

</div>

`;
        } else {
          tax.innerHTML = `<div class="result">No tax required as per Govt rules</div>`;
        }
      });
    </script>
  </body>
</html>
